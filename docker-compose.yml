version: '3.8'

services:
  portfolio-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio-app-standalone
    restart: unless-stopped
    environment:
      NODE_ENV: development
      # Update these URLs to point to your Strapi instance
      NEXT_PUBLIC_STRAPI_API_URL: http://localhost:1337/api
      STRAPI_API_URL: http://localhost:1337/api
    volumes:
      - .:/app
      - portfolio_node_modules:/app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    networks:
      - portfolio_frontend
    command: npm run dev

networks:
  portfolio_frontend:
    driver: bridge

volumes:
  portfolio_node_modules:
